<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QuickNotes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sb-w:240px;
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0efe9;--bg4:#e8e7e0;
  --bd:#e2e1da;--bd2:#d0cfc8;
  --tx:#1a1916;--mu:#999894;--mu2:#7a7874;
  --ac:#16a34a;--acb:rgba(22,163,74,0.08);--ach:#15803d;
  --dg:#dc2626;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);}
#app{height:100vh;display:flex;flex-direction:column;}
.aw{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.ac{width:320px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:32px;}
.abrand{margin-bottom:28px;}
.abrand h1{font-size:20px;font-weight:600;color:var(--tx);letter-spacing:-.4px;display:flex;align-items:center;gap:8px;}
.abrand h1 span{width:26px;height:26px;background:var(--ac);border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;}
.abrand p{font-size:12px;color:var(--mu2);margin-top:5px;}
.albl{font-size:11px;font-weight:500;color:var(--mu2);margin-bottom:5px;}
.ain{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:var(--sans);font-size:13px;padding:9px 12px;border-radius:7px;outline:none;margin-bottom:14px;transition:border-color .15s,box-shadow .15s;}
.ain:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(22,163,74,.1);}
.ain::placeholder{color:var(--mu);}
.abtn{width:100%;padding:10px;background:var(--ac);color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;border:none;border-radius:7px;cursor:pointer;transition:background .15s;}
.abtn:hover{background:var(--ach);}
.abtn:disabled{opacity:.5;cursor:default;}
.aerr{font-size:12px;color:var(--dg);margin-bottom:10px;min-height:14px;}
.aalt{font-size:12px;color:var(--mu2);text-align:center;margin-top:14px;}
.aalt a{color:var(--ac);cursor:pointer;font-weight:500;}
.main{flex:1;display:flex;overflow:hidden;}

/* ─── Sidebar ─── */
.sb{width:var(--sb-w);min-width:160px;max-width:480px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;position:relative;}
.sbh{padding:12px 12px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.sbt{font-size:12px;font-weight:600;color:var(--tx);flex:1;}
.sbnew{background:var(--ac);color:#fff;border:none;border-radius:6px;width:24px;height:24px;font-size:17px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;transition:background .15s;}
.sbnew:hover{background:var(--ach);}
.sbsearch{padding:8px 10px;border-bottom:1px solid var(--bd);}
.sbsearch input{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:var(--sans);font-size:12px;padding:6px 10px;border-radius:6px;outline:none;transition:border-color .15s;}
.sbsearch input::placeholder{color:var(--mu);}
.sbsearch input:focus{border-color:var(--ac);}
.nl{flex:1;overflow-y:auto;padding:4px;}
.nl::-webkit-scrollbar{width:3px;}
.nl::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.nr{display:flex;align-items:center;padding:8px 9px;cursor:pointer;border-radius:7px;margin-bottom:1px;gap:7px;user-select:none;border:1px solid transparent;transition:background .1s;}
.nr:hover{background:var(--bg3);}
.nr.active{}
.nr.drag-over-top{border-top:2px solid var(--ac)!important;}
.nr.drag-over-bot{border-bottom:2px solid var(--ac)!important;}
.nr.dragging{opacity:.4;}
.dh{color:var(--mu);font-size:12px;cursor:grab;opacity:0;flex-shrink:0;}
.nr:hover .dh{opacity:1;}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,.08);}
.nrt{font-size:12px;font-weight:500;color:var(--tx);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nr.active .nrt{}
.nrd{font-size:10px;color:var(--mu);flex-shrink:0;}
.nr-del{display:none;background:none;border:none;color:var(--mu);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;line-height:1;flex-shrink:0;transition:color .12s,background .12s;}
.nr:hover .nr-del{display:flex;align-items:center;justify-content:center;}
.nr-del:hover{color:var(--dg);background:rgba(220,38,38,.1);}

/* ─── Sidebar Footer ─── */
.sbf{padding:10px 12px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.ul{font-size:11px;color:var(--mu2);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.ul b{color:var(--ac);font-weight:600;}
/* Improved logout button */
.so{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--mu2);
  background:var(--bg3);border:1px solid var(--bd);
  cursor:pointer;font-family:var(--sans);
  padding:4px 9px;border-radius:6px;
  transition:color .15s,background .15s,border-color .15s;
  white-space:nowrap;flex-shrink:0;
}
.so:hover{color:var(--dg);background:rgba(220,38,38,.07);border-color:rgba(220,38,38,.2);}
.so svg{width:10px;height:10px;flex-shrink:0;}

.syncbadge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono);}
.syncbadge.saving{color:var(--mu2);background:var(--bg3);}
.syncbadge.saved{color:var(--ac);background:var(--acb);}
.syncbadge.err{color:var(--dg);background:rgba(220,38,38,.08);}

/* ─── Resize Handle ─── */
.sb-resize{
  position:absolute;right:-3px;top:0;bottom:0;width:6px;
  cursor:col-resize;z-index:10;
  display:flex;align-items:center;justify-content:center;
}
.sb-resize:hover .sb-resize-line,
.sb-resize.active .sb-resize-line{background:var(--ac);opacity:1;}
.sb-resize-line{
  width:2px;height:40px;border-radius:2px;
  background:var(--bd2);opacity:0;
  transition:opacity .15s,background .15s;
  pointer-events:none;
}

/* ─── Editor ─── */
.ew{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg2);}
.eh{padding:10px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nti{flex:1;background:none;border:none;color:var(--tx);font-family:var(--sans);font-size:17px;font-weight:600;outline:none;min-width:0;letter-spacing:-.3px;}
.nti::placeholder{color:var(--mu);}
.cpick{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.cpdot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;}
.cpdot:hover{transform:scale(1.25);}
.cpdot.sel{border-color:rgba(0,0,0,.4);}
.delbtn{background:none;border:none;color:var(--mu);cursor:pointer;font-size:13px;padding:3px 7px;border-radius:5px;transition:color .15s,background .15s;}
.delbtn:hover{color:var(--dg);background:rgba(220,38,38,.07);}
.tb{padding:5px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:1px;flex-wrap:wrap;background:var(--bg3);flex-shrink:0;}
.tbtn{background:none;border:none;color:var(--mu2);cursor:pointer;padding:4px 8px;border-radius:5px;font-size:12px;font-family:var(--sans);line-height:1.3;transition:color .1s,background .1s;white-space:nowrap;}
.tbtn:hover{color:var(--tx);background:var(--bg4);}
.tbtn.on{color:var(--ac);background:var(--acb);}
.tsep{width:1px;height:14px;background:var(--bd2);margin:0 4px;flex-shrink:0;}
.eb{flex:1;overflow-y:auto;padding:22px 28px;outline:none;font-size:14px;line-height:1.9;color:var(--tx);background:var(--bg2);}
.eb::-webkit-scrollbar{width:4px;}
.eb::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.eb:empty:before{content:attr(data-ph);color:var(--mu);pointer-events:none;}
.eb img{max-width:100%;border-radius:8px;margin:10px 0;display:block;border:1px solid var(--bd);}
.eb input[type=checkbox]{accent-color:var(--ac);margin-right:7px;cursor:pointer;width:14px;height:14px;}
.eb label{display:flex;align-items:center;cursor:pointer;margin:3px 0;}
.eb hr{border:none;border-top:1px solid var(--bd);margin:16px 0;}
.eb ul,.eb ol{padding-left:24px;}
.nosel{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--mu);font-size:13px;background:var(--bg);}
.nosel-icon{width:44px;height:44px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:6px;}
.nosel kbd{background:var(--bg2);border:1px solid var(--bd);padding:3px 9px;border-radius:5px;font-size:11px;font-family:var(--mono);color:var(--mu2);box-shadow:0 1px 2px rgba(0,0,0,.06);}
</style>
</head>
<body>
<div id="app"><div style="flex:1;display:flex;align-items:center;justify-content:center;height:100vh;font-size:12px;color:var(--mu);font-family:var(--mono)">loading…</div></div>
<script>
const COLORS={'':'#d1d0ca',r:'#fca5a5',o:'#fdba74',y:'#fcd34d',g:'#86efac',b:'#93c5fd',p:'#d8b4fe'};
const CDARK={'':'#9ca3af',r:'#dc2626',o:'#ea580c',y:'#d97706',g:'#16a34a',b:'#2563eb',p:'#9333ea'};
const CTITLE={'':'#f5f4f0',r:'#fff5f5',o:'#fff7ed',y:'#fefce8',g:'#f0fdf4',b:'#eff6ff',p:'#faf5ff'};
const SZ={s:'2',m:'3',l:'5'};
let S={mode:'loading',isReg:false,authErr:'',token:null,user:null,notes:[],activeId:null,search:'',syncStatus:'',dragId:null,dragOvId:null,dragBef:true};
let saveTimer=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ago(t){const s=Math.floor((Date.now()-t)/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent;}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(S.token)opts.headers['Authorization']='Bearer '+S.token;
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch('/api'+path,opts);
  const data=await r.json();
  if(!r.ok)throw new Error(data.error||'Request failed');
  return data;
}

function render(){
  const app=document.getElementById('app');if(!app)return;
  S.mode==='auth'?renderAuth(app):renderMain(app);
}

function renderAuth(app){
  app.innerHTML=`<div class="aw"><div class="ac">
    <div class="abrand">
      <h1><span>Q</span>QuickNotes</h1>
      <p>your notes, synced across every device</p>
    </div>
    <div class="albl">Username</div>
    <input class="ain" id="fu" type="text" placeholder="your username" autocomplete="username"/>
    <div class="albl">Password</div>
    <input class="ain" id="fp" type="password" placeholder="••••••••" autocomplete="${S.isReg?'new-password':'current-password'}"/>
    ${S.isReg?`<div class="albl">Confirm password</div><input class="ain" id="fp2" type="password" placeholder="••••••••"/>`:``}
    <div class="aerr">${esc(S.authErr)}</div>
    <button class="abtn" id="ago">${S.isReg?'Create account':'Sign in'}</button>
    <div class="aalt">${S.isReg?'Have an account? <a id="atog">Sign in</a>':"No account? <a id='atog'>Register</a>"}</div>
  </div></div>`;
  document.getElementById('fu').focus();
  document.getElementById('ago').onclick=doAuth;
  document.getElementById('atog').onclick=()=>{S.isReg=!S.isReg;S.authErr='';render();};
  document.getElementById('fp').onkeydown=e=>{if(e.key==='Enter')doAuth();};
  const fp2=document.getElementById('fp2');
  if(fp2)fp2.onkeydown=e=>{if(e.key==='Enter')doAuth();};
}

async function doAuth(){
  const u=document.getElementById('fu').value.trim().toLowerCase();
  const p=document.getElementById('fp').value;
  if(!u||!p){S.authErr='Fill in all fields';render();return;}
  const btn=document.getElementById('ago');
  btn.disabled=true;btn.textContent='...';
  try{
    let data;
    if(S.isReg){
      const p2=document.getElementById('fp2')?.value||'';
      if(p!==p2){S.authErr='Passwords do not match';render();return;}
      if(u.length<3){S.authErr='Username too short';render();return;}
      data=await api('POST','/register',{username:u,password:p});
    }else{
      data=await api('POST','/login',{username:u,password:p});
    }
    S.token=data.token;S.user=data.username;
    localStorage.setItem('qn_token',data.token);
    localStorage.setItem('qn_user',data.username);
    S.notes=await api('GET','/notes');
    S.activeId=S.notes.length?S.notes[0].id:null;
    S.mode='main';S.authErr='';render();
  }catch(e){S.authErr=e.message;render();}
}

function doLogout(){
  S.token=null;S.user=null;S.notes=[];S.activeId=null;S.mode='auth';
  localStorage.removeItem('qn_token');localStorage.removeItem('qn_user');
  render();
}

function renderMain(app){
  const active=S.notes.find(n=>n.id===S.activeId);
  const vis=S.search?S.notes.filter(n=>(n.title+' '+stripHtml(n.content||'')).toLowerCase().includes(S.search.toLowerCase())):S.notes;
  const cpHtml=Object.entries(COLORS).map(([k,c])=>`<div class="cpdot${active&&active.color===k?' sel':''}" data-c="${k}" style="background:${c}"></div>`).join('');
  const syncHtml=S.syncStatus?`<span class="syncbadge ${S.syncStatus==='saving'?'saving':S.syncStatus==='error'?'err':'saved'}">${S.syncStatus==='saving'?'saving…':S.syncStatus==='error'?'error':'✓ saved'}</span>`:'';
  const borderColor=active?CDARK[active.color||'']||CDARK['']:'#e2e1da';
  const titleBg=active?CTITLE[active.color||'']||CTITLE['']:CTITLE[''];

  // logout icon (arrow-right-from-bracket style)
  const logoutIcon=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3"/><polyline points="10 11 13 8 10 5"/><line x1="13" y1="8" x2="5" y2="8"/></svg>`;

  app.innerHTML=`<div class="main">
    <div class="sb" id="sb">
      <div class="sbh">
        <span class="sbt">Notes <span style="font-weight:400;color:var(--mu)">(${S.notes.length})</span></span>
        <button class="sbnew" id="sbnew" title="New note (Ctrl+N)">+</button>
      </div>
      <div class="sbsearch"><input id="sbq" placeholder="Search notes…" value="${esc(S.search)}"/></div>
      <div class="nl" id="nl">
        ${vis.length===0
          ?`<div style="padding:24px 12px;font-size:12px;color:var(--mu);text-align:center;line-height:1.8">${S.search?'No results found':'No notes yet.<br>Press + to create one.'}</div>`
          :vis.map(n=>{
              const isActive=n.id===S.activeId;
              const c=n.color||'';
              const activeStyle=isActive
                ?`background:${CTITLE[c]||CTITLE['']};border-color:${CDARK[c]||CDARK['']}30;border-left:2px solid ${CDARK[c]||CDARK['']};`
                :'';
              return `<div class="nr${isActive?' active':''}" data-id="${n.id}" draggable="true" style="${activeStyle}">
              <span class="dh">⠿</span>
              <span class="cdot" style="background:${COLORS[c]||COLORS['']}"></span>
              <span class="nrt" style="${isActive?`color:${CDARK[c]||CDARK['']}`:''}">${esc(n.title||'Untitled')}</span>
              <span class="nrd">${ago(n.updated_at||Date.now())}</span>
              <button class="nr-del" data-del="${n.id}" title="Delete note">✕</button>
            </div>`;}).join('')}
      </div>
      <div class="sbf">
        <span class="ul">@<b>${esc(S.user)}</b></span>
        <button class="so" id="sout" title="Sign out">${logoutIcon} Logout</button>
      </div>
      <div class="sb-resize" id="sb-resize"><div class="sb-resize-line"></div></div>
    </div>
    ${active?`<div class="ew">
      <div class="eh" style="border-left:3px solid ${borderColor};background:${titleBg};transition:background .2s,border-color .2s;">
        <input class="nti" id="ntitle" value="${esc(active.title)}" placeholder="Note title…"/>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
          ${syncHtml}
          <div class="cpick">${cpHtml}</div>
          <button class="delbtn" id="delbtn" title="Delete note">✕</button>
        </div>
      </div>
      <div class="tb">
        <button class="tbtn" data-cmd="bold" onmousedown="event.preventDefault()"><b>B</b></button>
        <button class="tbtn" data-cmd="italic" onmousedown="event.preventDefault()"><i>I</i></button>
        <button class="tbtn" data-cmd="underline" onmousedown="event.preventDefault()"><u>U</u></button>
        <button class="tbtn" data-cmd="strikeThrough" onmousedown="event.preventDefault()"><s>S</s></button>
        <div class="tsep"></div>
        <button class="tbtn" data-sz="s" onmousedown="event.preventDefault()" style="font-size:10px;font-weight:600">S</button>
        <button class="tbtn" data-sz="m" onmousedown="event.preventDefault()" style="font-size:12px;font-weight:600">M</button>
        <button class="tbtn" data-sz="l" onmousedown="event.preventDefault()" style="font-size:15px;font-weight:600">L</button>
        <div class="tsep"></div>
        <button class="tbtn" id="tb-cb" onmousedown="event.preventDefault()">☐ task</button>
        <button class="tbtn" data-cmd="insertUnorderedList" onmousedown="event.preventDefault()">• list</button>
        <button class="tbtn" data-cmd="insertOrderedList" onmousedown="event.preventDefault()">1. list</button>
        <button class="tbtn" id="tb-hr" onmousedown="event.preventDefault()">— divider</button>
        <div class="tsep"></div>
        <span style="font-size:10px;color:var(--mu);padding:0 4px;font-family:var(--mono)">Ctrl+V = paste image</span>
      </div>
      <div class="eb" id="eb" contenteditable="true" spellcheck="true" data-ph="Start typing…">${active.content||''}</div>
    </div>`
    :`<div class="ew"><div class="nosel">
        <div class="nosel-icon">📝</div>
        <div style="font-weight:500;color:var(--tx)">No note selected</div>
        <div style="font-size:12px">Create one or pick from the list</div>
        <div style="display:flex;gap:6px;margin-top:6px;align-items:center"><kbd>Ctrl+N</kbd><span style="font-size:11px">new note</span></div>
      </div></div>`}
  </div>`;

  attachEvents(active);
  initResize();
}

/* ─── Sidebar resize ─── */
function initResize(){
  const handle=document.getElementById('sb-resize');
  const sb=document.getElementById('sb');
  if(!handle||!sb)return;

  // Restore saved width
  const saved=localStorage.getItem('qn_sb_w');
  if(saved){
    const w=parseInt(saved,10);
    if(w>=160&&w<=480){sb.style.width=w+'px';}
  }

  let startX=0,startW=0,dragging=false;

  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    dragging=true;
    startX=e.clientX;
    startW=sb.getBoundingClientRect().width;
    handle.classList.add('active');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
  });

  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const dx=e.clientX-startX;
    const nw=Math.min(480,Math.max(160,startW+dx));
    sb.style.width=nw+'px';
  });

  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    handle.classList.remove('active');
    document.body.style.cursor='';
    document.body.style.userSelect='';
    const w=sb.getBoundingClientRect().width;
    localStorage.setItem('qn_sb_w',Math.round(w));
  });
}

function attachEvents(active){
  document.getElementById('sbnew').onclick=newNote;
  document.getElementById('sbq').oninput=e=>{
    S.search=e.target.value;
    const val=S.search;
    render();
    const q=document.getElementById('sbq');
    if(q){q.focus();q.setSelectionRange(val.length,val.length);}
  };
  document.getElementById('sout').onclick=()=>{
    if(confirm('Sign out?'))doLogout();
  };
  const nl=document.getElementById('nl');
  if(nl){
    nl.querySelectorAll('.nr').forEach(row=>{
      row.onclick=e=>{
        if(e.target.closest('.nr-del'))return;
        saveContent();S.activeId=row.dataset.id;render();
      };
      const delBtn=row.querySelector('.nr-del');
      if(delBtn){
        delBtn.onclick=async e=>{
          e.stopPropagation();
          if(!confirm('Delete this note?'))return;
          const id=row.dataset.id;
          if(S.activeId===id){
            const idx=S.notes.findIndex(n=>n.id===id);
            S.activeId=S.notes[idx+1]?.id||S.notes[idx-1]?.id||null;
          }
          S.notes=S.notes.filter(n=>n.id!==id);
          render();
          await api('DELETE',`/notes/${id}`);
        };
      }
      row.addEventListener('dragstart',e=>{S.dragId=row.dataset.id;e.dataTransfer.effectAllowed='move';setTimeout(()=>row.classList.add('dragging'),0);});
      row.addEventListener('dragend',()=>{row.classList.remove('dragging');nl.querySelectorAll('.nr').forEach(r=>r.classList.remove('drag-over-top','drag-over-bot'));});
      row.addEventListener('dragover',e=>{
        e.preventDefault();if(row.dataset.id===S.dragId)return;
        const rc=row.getBoundingClientRect();S.dragOvId=row.dataset.id;S.dragBef=e.clientY<rc.top+rc.height/2;
        nl.querySelectorAll('.nr').forEach(r=>r.classList.remove('drag-over-top','drag-over-bot'));
        row.classList.add(S.dragBef?'drag-over-top':'drag-over-bot');
      });
      row.addEventListener('drop',async e=>{
        e.preventDefault();
        if(!S.dragId||!S.dragOvId||S.dragId===S.dragOvId){render();return;}
        const fi=S.notes.findIndex(n=>n.id===S.dragId);
        const[mv]=S.notes.splice(fi,1);
        const ti=S.notes.findIndex(n=>n.id===S.dragOvId);
        S.notes.splice(S.dragBef?ti:ti+1,0,mv);
        S.dragId=null;S.dragOvId=null;render();
        await api('POST','/notes/reorder',{order:S.notes.map(n=>n.id)});
      });
    });
  }
  if(!active)return;
  const eb=document.getElementById('eb');
  const ntitle=document.getElementById('ntitle');
  ntitle.oninput=()=>schedSave();
  eb.oninput=()=>schedSave();
  eb.addEventListener('paste',handlePaste);
  eb.addEventListener('keyup',updTb);
  eb.addEventListener('mouseup',updTb);
  document.querySelectorAll('[data-cmd]').forEach(btn=>{
    btn.onclick=()=>{eb.focus();document.execCommand(btn.dataset.cmd,false,null);schedSave();updTb();};
  });
  document.querySelectorAll('[data-sz]').forEach(btn=>{
    btn.onclick=()=>{eb.focus();document.execCommand('fontSize',false,SZ[btn.dataset.sz]);schedSave();};
  });
  document.getElementById('tb-cb').onclick=()=>{
    eb.focus();
    document.execCommand('insertHTML',false,`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:2px 0"><input type="checkbox"/><span>Task item</span></label>`);
    schedSave();
  };
  document.getElementById('tb-hr').onclick=()=>{eb.focus();document.execCommand('insertHTML',false,'<hr/>');schedSave();};
  document.querySelectorAll('.cpdot').forEach(d=>{
    d.onclick=async()=>{
      const n=S.notes.find(x=>x.id===S.activeId);
      if(n){n.color=d.dataset.c;render();await api('PUT',`/notes/${n.id}`,n);}
    };
  });
  document.getElementById('delbtn').onclick=async()=>{
    if(!confirm('Delete this note?'))return;
    saveContent();
    const id=active.id;
    S.notes=S.notes.filter(n=>n.id!==id);
    S.activeId=S.notes.length?S.notes[0].id:null;
    render();
    await api('DELETE',`/notes/${id}`);
  };
  window.onkeydown=e=>{if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();newNote();}};
}

function schedSave(){
  S.syncStatus='saving';
  const badge=document.querySelector('.syncbadge');
  if(badge){badge.className='syncbadge saving';badge.textContent='saving…';}
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(saveContent,800);
}

async function saveContent(){
  if(!S.activeId)return;
  const t=document.getElementById('ntitle');
  const b=document.getElementById('eb');
  if(!t||!b)return;
  const n=S.notes.find(x=>x.id===S.activeId);if(!n)return;
  n.title=t.value;n.content=b.innerHTML;n.updated_at=Date.now();
  try{
    await api('PUT',`/notes/${n.id}`,n);
    S.syncStatus='saved';
  }catch{S.syncStatus='error';}
  const badge=document.querySelector('.syncbadge');
  if(badge){
    badge.className='syncbadge '+(S.syncStatus==='saved'?'saved':'err');
    badge.textContent=S.syncStatus==='saved'?'✓ saved':'error';
  }
}

async function newNote(){
  saveContent();
  const id='n_'+Date.now();
  const note={id,title:'',content:'',color:'',position:0,updated_at:Date.now()};
  S.notes.unshift(note);S.activeId=id;render();
  await api('PUT',`/notes/${id}`,note);
  setTimeout(()=>{const t=document.getElementById('ntitle');if(t)t.focus();},30);
}

function handlePaste(e){
  const items=Array.from(e.clipboardData?.items||[]);
  const img=items.find(i=>i.type.startsWith('image/'));
  if(!img)return;
  e.preventDefault();
  const reader=new FileReader();
  reader.onload=ev=>{
    const image=new Image();
    image.onload=()=>{
      const c=document.createElement('canvas');
      const MAX=900;let w=image.width,h=image.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(image,0,0,w,h);
      document.execCommand('insertHTML',false,`<img src="${c.toDataURL('image/jpeg',.82)}"/>`);
      schedSave();
    };
    image.src=ev.target.result;
  };
  reader.readAsDataURL(img.getAsFile());
}

function updTb(){
  ['bold','italic','underline','strikeThrough'].forEach(cmd=>{
    const el=document.querySelector(`[data-cmd="${cmd}"]`);
    if(el)el.classList.toggle('on',document.queryCommandState(cmd));
  });
}

async function init(){
  const token=localStorage.getItem('qn_token');
  const user=localStorage.getItem('qn_user');
  if(token&&user){
    S.token=token;S.user=user;
    try{
      S.notes=await api('GET','/notes');
      S.activeId=S.notes.length?S.notes[0].id:null;
      S.mode='main';
    }catch{
      localStorage.removeItem('qn_token');localStorage.removeItem('qn_user');
      S.mode='auth';
    }
  }else S.mode='auth';
  render();
}
init();
</script>
